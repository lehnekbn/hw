<!DOCTYPE html>
<html>
<body>
  <h1>Cloudflare Pages + Functions</h1>
  <button onclick="getTime()">What time is it?</button>
  <p id="display"></p>

  <script>
    async function getTime() {
      // Calls the function at /time
      const response = await fetch('/time');
      const responseA = await fetch('/a');
      const data = await response.json();
      const dataA = await responseA.json();
      document.getElementById('display').innerText = dataA.val; // "The server says: " + data.time + " for " + data.name;
    }
  </script>
</body>
</html>
