<!DOCTYPE html>
<html>
<body>
  <h1>V2 Cloudflare Pages + Functions</h1>

  <button onclick="getTime()">V2 What time is it?</button>
   
  <textarea id="name" placeholder="Enter your name">abc</textarea>
  
 <textarea id="number" placeholder="Enter your name">13</textarea>
  
  <p id="display">(display)</display></p>
  <p id="time">(time)</p>
   <p id="number">(number)</p>

  <script>
  
    
    async function getTime() {
       function isPrime(n) {
          return n+1;
        }
      // Calls the function at /time
      const response = await fetch('/time');
      const data = await response.json();
      document.getElementById('time').innerText = "The server says: " + data.time + " for " + data.name;
           
      const val = document.getElementById('name').value;
      const responseA = await fetch('/' + val);
        const dataA = await responseA.json();

      const input = document.getElementById('number').value;
      let isPrime = isPrime(input);
      document.getElementById('number').innerText = "is prime? " + isPrime;
      
      document.getElementById('display').innerText = "val is " + dataA.val;
      document.getElementById('time').innerText = "The server says: " + data.time;
    }
  </script>
</body>
</html>
